<!DOCTYPE html>
 
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Scorpion Café Rock Bar</title>

<style>
  
.whatsapp{
display:inline-block;
margin:25px 0;
padding:14px 28px;
background:#25D366;
color:white;
text-decoration:none;
font-size:20px;
font-weight:bold;
border-radius:8px;
transition:0.3s;
}

.whatsapp:hover{
background:#1da851;
}

.boton-carta{
html{
scroll-behavior:smooth;
}
display:inline-block;
margin:20px 10px;
padding:15px 35px;
background:#d40000;
color:white;
text-decoration:none;
font-size:20px;
font-weight:bold;
border-radius:8px;
transition:.3s;
}

.boton-carta:hover{
background:#ff1a1a;
}
  
body{
margin:0;
padding:0;
background:#000;
font-family:Arial,Helvetica,sans-serif;
color:white;
text-align:center;
}

header{
padding:25px;
}

header img{
width:300px;
max-width:90%;
height:auto;
}

h1{
font-family:"Trebuchet MS", Impact, Arial Black, sans-serif;
font-size:58px;
color:#d40000;
margin-top:20px;
margin-bottom:10px;
letter-spacing:2px;
text-transform:uppercase;
}

p{
margin:6px;
font-size:18px;
}

.menu img{
width:100%;
display:block;
margin:0 auto;
}

#contador{

font-size:28px;

margin-bottom:20px;

color:white;

}

#imagenCarta{

width:100%;

max-width:900px;

border-radius:10px;

}

.controles{

margin:30px;

}

.controles button{

background:#d40000;

color:white;

border:none;

padding:15px 30px;

font-size:20px;

border-radius:8px;

cursor:pointer;

margin:10px;

}

.controles button:hover{

background:#ff2a2a;

}

.controles button:disabled{

background:#555;

cursor:not-allowed;

opacity:.5;

}
 
</style>

</head>

<body>

<header>

<img src="./images/logo.png" alt="Scorpion Café Rock Bar">

<h1>SCORPION CAFÉ ROCK BAR</h1>

<p>📍Calle 78C # 102-14 Local 1, Bogotá, Colombia</p>

<p>🕒 Horarios</p>

<p>Martes y Miércoles: 2:30 p.m. – 6:00 p.m.</p>

<p>Jueves: 4:30 p.m. – 9:00 p.m.</p>

<p>Viernes y Sábado: 5:30 p.m. – 2:30 a.m.</p>

<a class="whatsapp"
href="https://wa.me/573021132519"
target="_blank">
📲 Escríbenos por WhatsApp
</a>

<a href="#carta" class="boton-carta">
📖 Ver carta
</a>
  
<div class="menu" id="carta">

<h2 id="contador">
Página 1 de 4
</h2>

<img
id="imagenCarta"
src="./images/pagina1.png"
alt="Carta Scorpion">

<div class="controles">

<button onclick="anterior()">
◀ Anterior
</button>

<button onclick="siguiente()">
Siguiente ▶
</button>

</div>

</div>

<script>

const imagenes=[

"./images/pagina1.png",

"./images/pagina2.png",

"./images/pagina3.png",

"./images/pagina4.png"

];

let pagina=0;

function actualizar(){

document.getElementById("imagenCarta").src=imagenes[pagina];

document.getElementById("contador").innerHTML="Página "+(pagina+1)+" de "+imagenes.length;

const botones=document.querySelectorAll(".controles button");

botones[0].disabled=(pagina===0);

botones[1].disabled=(pagina===imagenes.length-1);

}

function siguiente(){

if(pagina<imagenes.length-1){

pagina++;

actualizar();

}

}

function anterior(){

if(pagina>0){

pagina--;

actualizar();

}

}

let inicioX = 0;
let finX = 0;

const imagen = document.getElementById("imagenCarta");

imagen.addEventListener("touchstart", function(e){
    inicioX = e.changedTouches[0].screenX;
});

imagen.addEventListener("touchend", function(e){

    finX = e.changedTouches[0].screenX;

    if(inicioX - finX > 50){
        siguiente();
    }

    if(finX - inicioX > 50){
        anterior();
    }

});
 
</script>
 
</body>

</html>
